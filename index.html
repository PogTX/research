            "Math & Logic": [

                { title: "Cyberpunk culture and literature", desc: "A subgenre of science fiction set in a dystopian, high-tech future characterized by 'high tech and low life'." },
                { title: "HAARP conspiracies", desc: "Fringe theories surrounding a legitimate ionospheric research program in Alaska, often wrongfully blamed for weather manipulation and mind control." },
                { title: "Operation Northwoods", desc: "A genuine, declassified Cold War-era proposal where the CIA drafted plans to commit false flag terrorism against Americans to justify a war with Cuba." },
                { title: "Generational ships and interstellar travel", desc: "Hypothetical starships that travel at sub-light speeds, meaning the original occupants will die, leaving their descendants to reach the destination." },
                { title: "The AI Alignment Problem", desc: "The challenge in artificial intelligence safety research to ensure that artificial superintelligence shares and acts according to human values." },
                { title: "Post-scarcity economics", desc: "A hypothetical economic system where goods, services, and information are universally accessible and virtually free due to advanced automation." }
            ]
        };

        // Icons mapping for categories
        const categoryIcons = {
            "General": "globe",
            "Philosophy": "brain-circuit",
            "Psychology": "brain",
            "Unsolved Mysteries": "search-code",
            "Science & Physics": "atom",
            "Biology & Nature": "leaf",
            "Sociology & History": "landmark",
            "Math & Logic": "calculator",
            "Technology": "cpu",
            // New Categories
            "Cryptids & Folklore": "ghost",
            "Strange Artifacts": "gem",
            "Lost Worlds & Geography": "map",
            "Crimes & Ciphers": "fingerprint",
            "Natural Phenomena": "cloud-lightning",
            "Evolution & Deep Time": "hourglass",
            "Astrobiology": "telescope",
            "Futurism & Society": "satellite"
        };

        let currentCategory = 'All';
        let allTopicsList = [];

        // Flatten database for 'All' view and search
        for (const [cat, items] of Object.entries(database)) {
            items.forEach(item => {
                allTopicsList.push({ 
                    title: item.title, 
                    desc: item.desc, 
                    category: cat 
                });
            });
        }

        // --- Application Logic ---

        // Initialize App
        function init() {
            renderSidebar();
            renderGrid(allTopicsList);
            lucide.createIcons();

            // Search Listener
            document.getElementById('search-input').addEventListener('input', (e) => {
                handleSearch(e.target.value);
            });
        }

        // Sidebar rendering
        function renderSidebar() {
            const nav = document.getElementById('category-nav');
            
            // 'All' button
            const allBtn = createNavButton('All', 'layout-grid', currentCategory === 'All');
            allBtn.onclick = () => selectCategory('All');
            nav.appendChild(allBtn);

            // Category buttons
            for (const category in database) {
                const btn = createNavButton(category, categoryIcons[category] || 'folder', currentCategory === category);
                btn.onclick = () => selectCategory(category);
                nav.appendChild(btn);
            }
        }

        function createNavButton(label, iconName, isActive) {
            const btn = document.createElement('button');
            btn.className = `w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left transition-colors text-sm font-medium ${
                isActive 
                ? 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/20' 
                : 'text-gray-400 hover:bg-gray-800 hover:text-gray-200'
            }`;
            
            btn.innerHTML = `
                <i data-lucide="${iconName}" class="w-4 h-4 ${isActive ? 'text-indigo-400' : 'text-gray-500'}"></i>
                <span class="truncate">${label}</span>
                <span class="ml-auto text-xs bg-gray-800 px-2 py-0.5 rounded-full text-gray-500">
                    ${label === 'All' ? allTopicsList.length : database[label].length}
                </span>
            `;
            return btn;
        }

        function selectCategory(category) {
            currentCategory = category;
            document.getElementById('current-category-title').textContent = category === 'All' ? 'All Topics' : category;
            
            // Update active state in sidebar
            document.getElementById('category-nav').innerHTML = '';
            renderSidebar();
            lucide.createIcons();
            
            // Clear search
            document.getElementById('search-input').value = '';

            // Filter data
            if (category === 'All') {
                renderGrid(allTopicsList);
            } else {
                const filtered = database[category].map(item => ({ title: item.title, desc: item.desc, category: category }));
                renderGrid(filtered);
            }

            // Close sidebar on mobile
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
            
            // Scroll to top
            document.getElementById('main-scroll-area').scrollTop = 0;
        }

        function handleSearch(query) {
            query = query.toLowerCase();
            let sourceData = currentCategory === 'All' 
                ? allTopicsList 
                : database[currentCategory].map(item => ({ title: item.title, desc: item.desc, category: currentCategory }));
            
            // Search by title OR description
            const filtered = sourceData.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.desc.toLowerCase().includes(query)
            );
            
            if (query.trim() !== '') {
                document.getElementById('current-category-title').textContent = `Search: "${query}"`;
            } else {
                document.getElementById('current-category-title').textContent = currentCategory === 'All' ? 'All Topics' : currentCategory;
            }

            renderGrid(filtered);
        }

        // Render Grid of Cards
        function renderGrid(items) {
            const grid = document.getElementById('topics-grid');
            const noResults = document.getElementById('no-results');
            
            grid.innerHTML = '';
            
            if (items.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                noResults.style.display = 'flex';
                return;
            }
            
            grid.classList.remove('hidden');
            noResults.classList.add('hidden');
            noResults.style.display = 'none';

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'topic-card bg-gray-800/50 border border-gray-700 rounded-xl p-5 cursor-pointer flex flex-col justify-between group h-full';
                card.onclick = () => openModal(item.title);
                
                // Slight animation delay for staggered entrance
                card.style.animation = `fadeIn 0.3s ease-out ${index * 0.015}s both`; // Sped up slightly for large lists

                card.innerHTML = `
                    <div class="flex-1 flex flex-col">
                        <div class="text-xs font-semibold tracking-wider text-indigo-400 mb-2 uppercase flex items-center gap-1.5">
                            <i data-lucide="${categoryIcons[item.category] || 'folder'}" class="w-3 h-3"></i>
                            ${item.category}
                        </div>
                        <h3 class="text-lg font-medium text-gray-100 group-hover:text-white leading-snug">${item.title}</h3>
                        <p class="text-sm text-gray-400 mt-2 line-clamp-3 leading-relaxed flex-1">${item.desc}</p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-700/50 flex items-center text-sm font-medium text-gray-500 group-hover:text-indigo-400 transition-colors">
                        <span>Research deeper</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('mobile-backdrop');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        // Random Topic functionality
        function getRandomTopic() {
            const randomIndex = Math.floor(Math.random() * allTopicsList.length);
            const randomTopic = allTopicsList[randomIndex];
            openModal(randomTopic.title);
        }

        // --- Wikipedia API Integration & Modal ---
        
        async function openModal(title) {
            const modal = document.getElementById('info-modal');
            const titleEl = document.getElementById('modal-title');
            const loadingEl = document.getElementById('modal-loading');
            const contentArea = document.getElementById('modal-content-area');
            const descEl = document.getElementById('modal-description');
            const errorEl = document.getElementById('modal-error');
            const linkEl = document.getElementById('modal-link');
            
            // Reset state
            titleEl.textContent = title;
            loadingEl.classList.remove('hidden');
            contentArea.classList.add('hidden');
            errorEl.classList.add('hidden');
            modal.classList.remove('hidden');
            
            // Build fallback generic search link immediately
            const searchUrl = `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(title)}`;
            linkEl.href = searchUrl;

            // Fetch Data
            try {
                // Using the Wikipedia Action API for a reliable search + extract combo
                const apiUrl = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exchars=800&exintro=1&explaintext=1&generator=search&gsrsearch=${encodeURIComponent(title)}&gsrlimit=1&origin=*`;
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                loadingEl.classList.add('hidden');

                if (data.query && data.query.pages) {
                    const pages = data.query.pages;
                    const pageId = Object.keys(pages)[0];
                    const pageData = pages[pageId];
                    
                    if (pageData.extract) {
                        // Found a summary
                        descEl.textContent = pageData.extract;
                        linkEl.href = `https://en.wikipedia.org/wiki/${encodeURIComponent(pageData.title)}`;
                        contentArea.classList.remove('hidden');
                    } else {
                        throw new Error("No extract found");
                    }
                } else {
                    throw new Error("No pages found");
                }
            } catch (error) {
                console.error("Wiki Fetch Error:", error);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        function closeModal() {
            const modal = document.getElementById('info-modal');
            modal.classList.add('hidden');
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Run Init on Load
        window.onload = init;
    </script>
</body>
</html>
